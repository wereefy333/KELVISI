services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumiere
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: lumiere
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiere"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Express API (backend) ───────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lumiere:${DB_PASSWORD:-changeme}@db:5432/lumiere
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-random-32-chars}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost}
      CORS_ORIGINS: ${APP_PUBLIC_URL:-http://localhost}
      PORT: "3001"
      HOST: "0.0.0.0"

  # ── Nginx (фронтенд + reverse-proxy) ───────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      init:
        condition: service_completed_successfully
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend:/usr/share/nginx/html:ro

  # ── Одноразовый контейнер: сборка фронтенда + миграции ─
  init:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lumiere:${DB_PASSWORD:-changeme}@db:5432/lumiere
    entrypoint: ["sh", "-c", "npx prisma migrate deploy && cp -r /app/dist/* /frontend/"]
    volumes:
      - frontend:/frontend

volumes:
  pgdata:
  frontend:
