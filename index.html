<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMIÈRE | Salon & Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
      /* ── Marquee — single wrapper moves 0 → -50% (= exactly one copy width) ── */
      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      .animate-marquee {
        display: flex;
        width: max-content;
        animation: marquee 44s linear infinite;
      }
      .animate-marquee:hover { animation-play-state: paused; }

      /* ── Scroll-reveal (section level) ── */
      .sr-item {
        opacity: 0;
        transform: translateY(32px);
        transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1);
      }
      .sr-item.sr-visible {
        opacity: 1;
        transform: none;
      }
      /* stagger delays used by JS */
      .sr-d1 { transition-delay: 0.08s  !important; }
      .sr-d2 { transition-delay: 0.18s  !important; }
      .sr-d3 { transition-delay: 0.28s  !important; }
      .sr-d4 { transition-delay: 0.38s  !important; }
      .sr-d5 { transition-delay: 0.48s  !important; }
      .sr-d6 { transition-delay: 0.58s  !important; }

      /* ── Hero fade-in ── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.9s ease-out forwards;
      }

      /* ── Skeleton shimmer ── */
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      .animate-shimmer {
        background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      body {
        background-color: #09090b; /* zinc-950 */
        color: #e4e4e7; /* zinc-200 */
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {

              serif: ['"Playfair Display"', 'serif'],

              gold: {
